# Directus CMS Configuration

upstream directus_backend {
    least_conn;
    server directus:8055 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

server {
    listen 80;
    server_name directus.example.com;

    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name directus.example.com;

    # SSL Certificates
    ssl_certificate /etc/nginx/certs/directus.example.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/directus.example.com/privkey.pem;

    # Security
    limit_req zone=general burst=50 nodelay;
    limit_conn addr 20;

    # File upload limits
    client_max_body_size 100M;

    # Logs
    access_log /var/log/nginx/directus_access.log main;
    error_log /var/log/nginx/directus_error.log warn;

    location / {
        proxy_pass http://directus_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Buffer settings for large responses
        proxy_buffering on;
        proxy_buffer_size 16k;
        proxy_buffers 8 16k;
    }

    # WebSocket support for real-time features
    location /websocket {
        proxy_pass http://directus_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }
}
