# Gradio/Streamlit UI Configuration

upstream gradio_backend {
    least_conn;
    server gradio:7860 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

upstream streamlit_backend {
    least_conn;
    server streamlit:8501 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

server {
    listen 80;
    server_name chat.example.com;

    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name chat.example.com;

    # SSL Certificates
    ssl_certificate /etc/nginx/certs/chat.example.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/chat.example.com/privkey.pem;

    # Security
    limit_req zone=general burst=50 nodelay;
    limit_conn addr 20;

    # Logs
    access_log /var/log/nginx/chat_access.log main;
    error_log /var/log/nginx/chat_error.log warn;

    # Default to Gradio
    location / {
        proxy_pass http://gradio_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Gradio specific
        proxy_buffering off;
        proxy_read_timeout 86400;

        # WebSocket support
        proxy_set_header Connection $connection_upgrade;
    }

    # Streamlit alternative path
    location /streamlit/ {
        proxy_pass http://streamlit_backend/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Streamlit specific
        proxy_buffering off;
        proxy_read_timeout 86400;
    }

    # Static files
    location /static {
        proxy_pass http://gradio_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_cache_valid 200 1h;
        add_header Cache-Control "public, immutable";
    }

    # File uploads/downloads
    location /file {
        proxy_pass http://gradio_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        client_max_body_size 100M;
    }
}

# Map for connection upgrade
map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}
