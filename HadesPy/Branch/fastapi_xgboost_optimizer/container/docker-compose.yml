version: '3.8'

services:
  # PostgreSQL with PostGIS
  postgres:
    image: postgis/postgis:16-3.4
    container_name: fastapi-optimizer-postgres
    environment:
      POSTGRES_DB: optimizer_db
      POSTGRES_USER: optimizer_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secure_password}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --locale=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U optimizer_user -d optimizer_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - optimizer-network

  # Hasura GraphQL Engine
  hasura:
    image: hasura/graphql-engine:v2.37.0
    container_name: fastapi-optimizer-hasura
    environment:
      HASURA_GRAPHQL_DATABASE_URL: postgres://optimizer_user:${POSTGRES_PASSWORD:-secure_password}@postgres:5432/optimizer_db
      HASURA_GRAPHQL_ADMIN_SECRET: ${HASURA_ADMIN_SECRET:-hasura_admin_secret}
      HASURA_GRAPHQL_ENABLE_CONSOLE: "true"
      HASURA_GRAPHQL_DEV_MODE: "false"
      HASURA_GRAPHQL_LOG_LEVEL: "info"
      HASURA_GRAPHQL_ENABLE_TELEMETRY: "false"
      HASURA_GRAPHQL_JWT_SECRET: '{"type":"HS256", "key": "${JWT_SECRET:-jwt_secret_key}"}'
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - optimizer-network

  # Redis for caching and session management
  redis:
    image: redis:7-alpine
    container_name: fastapi-optimizer-redis
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_password}
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-redis_password}"]
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - optimizer-network

  # FastAPI Application
  app:
    build:
      context: ..
      dockerfile: container/Containerfile
      target: production
    container_name: fastapi-optimizer-app
    environment:
      # Database
      DATABASE_URL: postgres+asyncpg://optimizer_user:${POSTGRES_PASSWORD:-secure_password}@postgres:5432/optimizer_db
      
      # Hasura
      HASURA_URL: http://hasura:8080/v1/graphql
      HASURA_ADMIN_SECRET: ${HASURA_ADMIN_SECRET:-hasura_admin_secret}
      
      # Redis
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_password}@redis:6379/0
      
      # Security
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-here}
      JWT_SECRET: ${JWT_SECRET:-jwt_secret_key}
      ALLOWED_API_KEYS: ${ALLOWED_API_KEYS:-key1,key2,key3}
      
      # Application
      DEBUG: "false"
      LOG_LEVEL: "INFO"
      LOG_FORMAT: "json"
      ENVIRONMENT: "production"
      
      # Optimization
      XGBOOST_MODEL_PATH: /app/models/xgboost
      PYGAD_POPULATION_SIZE: "100"
      PYGAD_NUM_GENERATIONS: "50"
      ORTOOLS_MAX_TIME: "30"
      
      # Rate Limiting
      RATE_LIMIT: "100/minute"
      RATE_LIMIT_BURST: "10"
      
      # Workers
      WORKERS: "4"
    volumes:
      - ../logs:/app/logs
      - ../models:/app/models
      - ../config:/app/config
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      hasura:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - optimizer-network
    restart: unless-stopped

  # Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: fastapi-optimizer-nginx
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      app:
        condition: service_healthy
    networks:
      - optimizer-network
    restart: unless-stopped

  # Prometheus for metrics collection
  prometheus:
    image: prom/prometheus:latest
    container_name: fastapi-optimizer-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    networks:
      - optimizer-network

  # Grafana for metrics visualization
  grafana:
    image: grafana/grafana:latest
    container_name: fastapi-optimizer-grafana
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - optimizer-network

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  optimizer-network:
    driver: bridge