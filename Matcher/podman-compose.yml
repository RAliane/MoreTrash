version: '3.9'

services:
  # PostgreSQL 13 Database
  postgres:
    image: docker.io/library/postgres:13-alpine
    container_name: matchgorithm-postgres
    secrets:
      - postgres_user
      - postgres_password
      - postgres_db
    environment:
      POSTGRES_USER_FILE: /run/secrets/postgres_user
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_DB_FILE: /run/secrets/postgres_db
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - matchgorithm-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$(cat /run/secrets/postgres_user)"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Directus CMS
  directus:
    image: docker.io/directus/directus:latest
    container_name: matchgorithm-directus
    depends_on:
      postgres:
        condition: service_healthy
    secrets:
      - postgres_user
      - postgres_password
      - postgres_db
      - directus_secret
      - directus_admin_email
      - directus_admin_password
    environment:
      DB_CLIENT: pg
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE_FILE: /run/secrets/postgres_db
      DB_USER_FILE: /run/secrets/postgres_user
      DB_PASSWORD_FILE: /run/secrets/postgres_password
      KEY_FILE: /run/secrets/directus_secret
      SECRET_FILE: /run/secrets/directus_secret
      ADMIN_EMAIL_FILE: /run/secrets/directus_admin_email
      ADMIN_PASSWORD_FILE: /run/secrets/directus_admin_password
      PUBLIC_URL: http://localhost:8055
    volumes:
      - directus_uploads:/directus/uploads
      - directus_extensions:/directus/extensions
    ports:
      - "8055:8055"
    networks:
      - matchgorithm-network
    restart: unless-stopped

  # Hasura GraphQL Engine
  hasura:
    image: docker.io/hasura/graphql-engine:latest
    container_name: matchgorithm-hasura
    depends_on:
      postgres:
        condition: service_healthy
    secrets:
      - postgres_user
      - postgres_password
      - postgres_db
      - hasura_admin_secret
    environment:
      HASURA_GRAPHQL_DATABASE_URL: postgresql://$(cat /run/secrets/postgres_user):$(cat /run/secrets/postgres_password)@postgres:5432/$(cat /run/secrets/postgres_db)
      HASURA_GRAPHQL_ADMIN_SECRET_FILE: /run/secrets/hasura_admin_secret
      HASURA_GRAPHQL_ENABLE_CONSOLE: "true"
      HASURA_GRAPHQL_ENABLED_LOG_TYPES: startup, http-log, webhook-log, websocket-log, query-log
      HASURA_GRAPHQL_UNAUTHORIZED_ROLE: anonymous
    ports:
      - "8080:8080"
    networks:
      - matchgorithm-network
    restart: unless-stopped

  # n8n Workflow Automation
  n8n:
    image: docker.io/n8nio/n8n:latest
    container_name: matchgorithm-n8n
    depends_on:
      postgres:
        condition: service_healthy
    secrets:
      - postgres_user
      - postgres_password
      - postgres_db
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_DATABASE_FILE: /run/secrets/postgres_db
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_USER_FILE: /run/secrets/postgres_user
      DB_POSTGRESDB_PASSWORD_FILE: /run/secrets/postgres_password
      N8N_HOST: 0.0.0.0
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      NODE_ENV: production
    volumes:
      - n8n_data:/home/node/.n8n
    ports:
      - "5678:5678"
    networks:
      - matchgorithm-network
    restart: unless-stopped

  # Dioxus Application (Rust)
  app:
    build:
      context: .
      dockerfile: Containerfile
    container_name: matchgorithm-app
    depends_on:
      postgres:
        condition: service_healthy
      directus:
        condition: service_started
      hasura:
        condition: service_started
    secrets:
      - postgres_user
      - postgres_password
      - postgres_db
      - directus_url
      - directus_token
      - hasura_endpoint
      - hasura_admin_secret
      - n8n_webhook_url
      - n8n_api_url
      - google_client_id
      - google_client_secret
      - github_client_id
      - github_client_secret
      - groq_api_key
    environment:
      RUST_LOG: info
      DATABASE_URL_FILE: /run/secrets/database_url
      DIRECTUS_URL_FILE: /run/secrets/directus_url
      DIRECTUS_TOKEN_FILE: /run/secrets/directus_token
      HASURA_GRAPHQL_ENDPOINT_FILE: /run/secrets/hasura_endpoint
      HASURA_ADMIN_SECRET_FILE: /run/secrets/hasura_admin_secret
    ports:
      - "8000:8000"
    networks:
      - matchgorithm-network
    restart: unless-stopped

  # Nginx Reverse Proxy
  nginx:
    image: docker.io/library/nginx:alpine
    container_name: matchgorithm-nginx
    depends_on:
      - app
      - directus
      - hasura
      - n8n
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    ports:
      - "80:80"
      - "443:443"
    networks:
      - matchgorithm-network
    restart: unless-stopped

networks:
  matchgorithm-network:
    driver: bridge

volumes:
  postgres_data:
  directus_uploads:
  directus_extensions:
  n8n_data:

secrets:
  postgres_user:
    external: true
  postgres_password:
    external: true
  postgres_db:
    external: true
  directus_url:
    external: true
  directus_token:
    external: true
  directus_secret:
    external: true
  directus_admin_email:
    external: true
  directus_admin_password:
    external: true
  hasura_endpoint:
    external: true
  hasura_admin_secret:
    external: true
  n8n_webhook_url:
    external: true
  n8n_api_url:
    external: true
  google_client_id:
    external: true
  google_client_secret:
    external: true
  github_client_id:
    external: true
  github_client_secret:
    external: true
  groq_api_key:
    external: true
