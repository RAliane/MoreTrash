name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    outputs:
      security-passed: ${{ steps.security-check.outputs.result }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Run cargo audit
        run: |
          cargo install cargo-audit
          cargo audit --json > cargo-audit-report.json
        continue-on-error: true

      - name: Run Bandit (Python SAST)
        run: |
          pip install bandit
          bandit -r fastapi_xgboost_optimizer/app/ -f json -o bandit-report.json
        continue-on-error: true

      - name: Run Safety (Python dependencies)
        run: |
          pip install safety
          cd fastapi_xgboost_optimizer
          safety check --json > ../safety-report.json
        continue-on-error: true

      - name: Check Python dependencies
        run: |
          pip install pip-audit
          cd fastapi_xgboost_optimizer
          pip-audit --format json > ../pip-audit-report.json
        continue-on-error: true

      - name: Secret scanning
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Check for hardcoded secrets
        run: |
          if find . -name "*.env*" -type f -exec grep -l "password\|secret\|key\|token" {} \; | grep -v .git; then
            echo "❌ Hardcoded secrets found in environment files"
            exit 1
          else
            echo "✅ No hardcoded secrets found"
          fi

      - name: Security check result
        id: security-check
        run: |
          # Check if any security scans failed critically
          if [ -f cargo-audit-report.json ] && grep -q '"vulnerabilities"' cargo-audit-report.json; then
            echo "result=warning" >> $GITHUB_OUTPUT
            echo "⚠️  Vulnerabilities found in Rust dependencies"
          elif [ -f bandit-report.json ] && grep -q '"severity"' bandit-report.json; then
            echo "result=warning" >> $GITHUB_OUTPUT
            echo "⚠️  Security issues found in Python code"
          else
            echo "result=passed" >> $GITHUB_OUTPUT
            echo "✅ Security scans completed"
          fi
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: security
    if: needs.security.outputs.security-passed != 'failed'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy

    - name: Cache dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-

    - name: Check formatting
      run: cargo fmt --all -- --check

    - name: Run clippy
      run: cargo clippy -- -D warnings

    - name: Run tests
      run: cargo test --verbose

    - name: Run security audit
      run: |
        cargo install cargo-audit
        cargo audit

      - name: Install UV
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install Python dependencies with UV
        run: |
          cd fastapi_xgboost_optimizer
          /home/runner/.local/bin/uv pip install -e . --system

      - name: Run Bandit (Python SAST)
        run: |
          /home/runner/.local/bin/uv pip install bandit --system
          bandit -r fastapi_xgboost_optimizer/app/ -f json -o bandit-report.json
        continue-on-error: true

      - name: Run Safety (Python dependencies)
        run: |
          /home/runner/.local/bin/uv pip install safety --system
          cd fastapi_xgboost_optimizer
          safety check --json > ../safety-report.json
        continue-on-error: true

    - name: Secret scanning
      uses: gitleaks/gitleaks-action@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      continue-on-error: true

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Cache dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

    - name: Build release
      run: cargo build --release

    - name: Install Podman
      run: |
        sudo apt-get update
        sudo apt-get install -y podman

    - name: Build container image
      run: podman build -t matchgorithm:${{ github.sha }} .

    - name: Scan container image
      run: |
        # Install Trivy
        curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
        # Scan for vulnerabilities
        trivy image --exit-code 1 --no-progress --format json matchgorithm:${{ github.sha }} > trivy-report.json
      continue-on-error: true

    - name: Login to Container Registry
      if: env.REGISTRY_PASSWORD != ''
      run: echo ${{ secrets.REGISTRY_PASSWORD }} | podman login ${{ secrets.REGISTRY_URL }} -u ${{ secrets.REGISTRY_USERNAME }} --password-stdin

    - name: Push container image
      if: env.REGISTRY_PASSWORD != ''
      run: |
        podman tag matchgorithm:${{ github.sha }} ${{ secrets.REGISTRY_URL }}/matchgorithm:${{ github.sha }}
        podman tag matchgorithm:${{ github.sha }} ${{ secrets.REGISTRY_URL }}/matchgorithm:latest
        podman push ${{ secrets.REGISTRY_URL }}/matchgorithm:${{ github.sha }}
        podman push ${{ secrets.REGISTRY_URL }}/matchgorithm:latest

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Deploy to production
      run: |
        echo "Deployment trigger for production environment"
        # Add your deployment commands here
        # Example: kubectl apply -f k8s/ or podman-compose up -d on remote server
        # This could trigger a webhook to your deployment system