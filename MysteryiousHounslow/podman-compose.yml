version: '3.9'

services:
  # PostgreSQL 13 Database
  postgres:
    image: docker.io/library/postgres:13-alpine
    container_name: matchgorithm-postgres
    secrets:
      - postgres_user
      - postgres_password
      - postgres_db
    environment:
      POSTGRES_USER_FILE: /run/secrets/postgres_user
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_DB_FILE: /run/secrets/postgres_db
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - db-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$(cat /run/secrets/postgres_user)"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '1.0'
          memory: 1G

  # Directus CMS
  directus:
    image: docker.io/directus/directus:latest
    container_name: matchgorithm-directus
    depends_on:
      postgres:
        condition: service_healthy
    secrets:
      - postgres_user
      - postgres_password
      - postgres_db
      - directus_secret
      - directus_admin_email
      - directus_admin_password
    environment:
      DB_CLIENT: pg
      DB_CONNECTION_STRING: postgres://$(cat /run/secrets/postgres_user):$(cat /run/secrets/postgres_password)@postgres:5432/$(cat /run/secrets/postgres_db)
      ADMIN_EMAIL: admin@matchgorithm.com
      ADMIN_PASSWORD: secure_password_here
       PUBLIC_URL: https://directus.matchgorithm.com
       KEY_FILE: /run/secrets/directus_secret
       SECRET_FILE: /run/secrets/directus_secret
       STORAGE_LOCAL_ROOT: /directus/uploads
       STORAGE_LOCAL_DRIVER: local
       SSL__CERT_FILE: /etc/letsencrypt/live/directus.matchgorithm.com/fullchain.pem
       SSL__KEY_FILE: /etc/letsencrypt/live/directus.matchgorithm.com/privkey.pem
       SSL__FORCE: "true"
       AUTH_PROVIDERS: "directus"
       AUTH_PASSWORD_RESET: "true"
       AUTH_PUBLIC_REGISTRATION: "true"
       SMTP_HOST: "smtp.gmail.com"
       SMTP_PORT: "587"
       SMTP_USER: "matchgorithm@gmail.com"
       SMTP_PASSWORD_FILE: /run/secrets/smtp_password
       SMTP_FROM: "noreply@matchgorithm.com"
    volumes:
      - ./directus/uploads:/directus/uploads
      - ./directus/extensions:/directus/extensions
      - ./certs:/etc/letsencrypt:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8055/server/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - auth-net
      - db-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 768M
        reservations:
          cpus: '0.5'
          memory: 384M

  # Hasura GraphQL Engine
  hasura:
    image: docker.io/hasura/graphql-engine:latest
    container_name: matchgorithm-hasura
    depends_on:
      postgres:
        condition: service_healthy
    secrets:
      - postgres_user
      - postgres_password
      - postgres_db
      - hasura_admin_secret
    environment:
      HASURA_GRAPHQL_DATABASE_URL: postgresql://$(cat /run/secrets/postgres_user):$(cat /run/secrets/postgres_password)@postgres:5432/$(cat /run/secrets/postgres_db)
      HASURA_GRAPHQL_ADMIN_SECRET_FILE: /run/secrets/hasura_admin_secret
      HASURA_GRAPHQL_ENABLE_CONSOLE: "true"
      HASURA_GRAPHQL_ENABLED_LOG_TYPES: startup, http-log, webhook-log, websocket-log, query-log
      HASURA_GRAPHQL_UNAUTHORIZED_ROLE: anonymous
    ports:
      - "8080:8080"
    networks:
      - auth-net
      - db-net
    restart: unless-stopped

  # n8n Workflow Automation
  n8n:
    image: docker.io/n8nio/n8n:latest
    container_name: matchgorithm-n8n
    depends_on:
      postgres:
        condition: service_healthy
    secrets:
      - postgres_user
      - postgres_password
      - postgres_db
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_DATABASE_FILE: /run/secrets/postgres_db
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_USER_FILE: /run/secrets/postgres_user
      DB_POSTGRESDB_PASSWORD_FILE: /run/secrets/postgres_password
      N8N_HOST: 0.0.0.0
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      NODE_ENV: production
    volumes:
      - n8n_data:/home/node/.n8n
    ports:
      - "5678:5678"
    networks:
      - auth-net
    restart: unless-stopped

  # Monitoring Services
  prometheus:
    image: prom/prometheus:latest
    container_name: matchgorithm-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    networks:
      - edge-net
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: matchgorithm-grafana
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: secure_password_here
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - edge-net
    restart: unless-stopped

  # Dioxus Application (Rust)
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: matchgorithm-app
    depends_on:
      postgres:
        condition: service_healthy
      directus:
        condition: service_started
      hasura:
        condition: service_started
    secrets:
      - postgres_user
       - postgres_password
       - postgres_db
       - directus_url
       - directus_token
       - hasura_endpoint
       - hasura_admin_secret
       - jwt_private_key_pem
       - jwt_public_key_pem
       - n8n_webhook_url
       - n8n_api_url
       - google_client_id
       - google_client_secret
       - github_client_id
       - github_client_secret
       - groq_api_key
    environment:
      RUST_LOG: info
      DATABASE_URL_FILE: /run/secrets/database_url
      DIRECTUS_URL_FILE: /run/secrets/directus_url
      DIRECTUS_API_KEY_FILE: /run/secrets/directus_token
      HASURA_GRAPHQL_ENDPOINT_FILE: /run/secrets/hasura_endpoint
      HASURA_ADMIN_SECRET_FILE: /run/secrets/hasura_admin_secret
      JWT_PRIVATE_KEY_PEM_FILE: /run/secrets/jwt_private_key_pem
      JWT_PUBLIC_KEY_PEM_FILE: /run/secrets/jwt_public_key_pem
     ports:
       - "8000:8000"
    networks:
      - edge-net
      - auth-net
     healthcheck:
       test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8000/api/health"]
       interval: 30s
       timeout: 10s
       retries: 3
       start_period: 40s
      restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

  # Nginx Reverse Proxy
  nginx:
    image: docker.io/library/nginx:alpine
    container_name: matchgorithm-nginx
    depends_on:
      - app
      - directus
      - hasura
      - n8n
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    ports:
      - "80:80"
      - "443:443"
    networks:
      - edge-net
    restart: unless-stopped

networks:
  edge-net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.0.1.0/24
  auth-net:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 10.0.2.0/24
  db-net:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 10.0.3.0/24

volumes:
  postgres_data:
  directus_uploads:
  directus_extensions:
  n8n_data:
  prometheus_data:
  grafana_data:

secrets:
  postgres_user:
    external: true
  postgres_password:
    external: true
  postgres_db:
    external: true
  directus_secret:
    external: true
  directus_admin_email:
    external: true
  directus_admin_password:
    external: true
  hasura_admin_secret:
    external: true
  jwt_private_key_pem:
    external: true
  jwt_public_key_pem:
    external: true
  directus_api_key:
    external: true
  directus_url:
    external: true
  directus_token:
    external: true
  hasura_endpoint:
    external: true
  n8n_webhook_url:
    external: true
  n8n_api_url:
    external: true
  google_client_id:
    external: true
  google_client_secret:
    external: true
  github_client_id:
    external: true
  github_client_secret:
    external: true
  groq_api_key:
    external: true
  database_url:
    external: true
  smtp_password:
    external: true
