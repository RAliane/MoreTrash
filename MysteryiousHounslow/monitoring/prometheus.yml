global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  # - "first_rules.yml"
  # - "second_rules.yml"

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'matchgorithm-app'
    static_configs:
      - targets: ['app:8000']
    scrape_interval: 30s

  - job_name: 'directus'
    static_configs:
      - targets: ['directus:8055']
    scrape_interval: 30s

  - job_name: 'hasura'
    static_configs:
      - targets: ['hasura:8080']
    scrape_interval: 30s

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres:5432']
    scrape_interval: 30s

  - job_name: 'n8n'
    static_configs:
      - targets: ['n8n:5678']
    scrape_interval: 30s

  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx:80']
    scrape_interval: 30s